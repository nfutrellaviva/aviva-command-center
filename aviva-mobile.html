<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Aviva Tasks"/>
<meta name="theme-color" content="#191816"/>
<title>Aviva Tasks</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:#111110;font-family:'Plus Jakarta Sans',sans-serif;color:#F9F7F4;overflow:hidden}
  .app{display:flex;flex-direction:column;height:100vh;height:100dvh}
  .header{background:#191816;border-bottom:0.5px solid rgba(249,247,244,0.08);padding:16px 20px;padding-top:max(16px,env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .wm-a{font-size:12px;font-weight:500;letter-spacing:0.2em;color:#F9F7F4}
  .wm-b{font-size:7px;letter-spacing:0.35em;color:rgba(249,247,244,0.4)}
  .header-right{display:flex;align-items:center;gap:8px}
  .saved-indicator{font-size:11px;color:rgba(249,247,244,0.35);letter-spacing:0.03em}
  .add-form{background:#191816;border-bottom:0.5px solid rgba(249,247,244,0.08);padding:14px 20px;flex-shrink:0}
  .add-input{width:100%;font-size:16px;font-family:'Plus Jakarta Sans',sans-serif;padding:12px 14px;background:rgba(249,247,244,0.05);border:0.5px solid rgba(249,247,244,0.12);color:#F9F7F4;margin-bottom:10px;-webkit-appearance:none;border-radius:0}
  .add-input::placeholder{color:rgba(249,247,244,0.3)}
  .add-input:focus{outline:none;border-color:rgba(123,69,24,0.7)}
  .add-row{display:flex;gap:8px}
  .add-select,.add-date{flex:1;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;padding:10px 8px;background:rgba(249,247,244,0.05);border:0.5px solid rgba(249,247,244,0.12);color:#F9F7F4;-webkit-appearance:none;border-radius:0;color-scheme:dark}
  .add-select option{background:#191816}
  .add-btn{font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;padding:10px 18px;background:#7B4518;border:none;color:#F9F7F4;cursor:pointer;letter-spacing:0.06em;white-space:nowrap}
  .add-btn:active{background:#8f5220}
  .tabs{display:flex;background:#191816;border-bottom:0.5px solid rgba(249,247,244,0.08);flex-shrink:0}
  .tab{flex:1;font-size:11px;font-family:'Plus Jakarta Sans',sans-serif;padding:10px 4px;background:transparent;border:none;border-bottom:1.5px solid transparent;color:rgba(249,247,244,0.4);cursor:pointer;letter-spacing:0.06em;text-transform:uppercase}
  .tab.active{color:#F9F7F4;border-bottom-color:#7B4518}
  .task-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:max(12px,env(safe-area-inset-bottom))}
  .task{background:#191816;border-bottom:0.5px solid rgba(249,247,244,0.06);padding:14px 20px;display:flex;align-items:flex-start;gap:12px}
  .task.done{opacity:0.35}
  .task.done .task-title{text-decoration:line-through}
  .pri-bar{width:2px;flex-shrink:0;align-self:stretch}
  .check{width:20px;height:20px;border:0.5px solid rgba(249,247,244,0.2);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;cursor:pointer}
  .check.checked{background:#7B4518;border-color:#7B4518}
  .task-body{flex:1;min-width:0}
  .task-title{font-size:14px;font-weight:500;color:#F9F7F4;margin-bottom:2px;line-height:1.4}
  .task-meta{font-size:11px;color:rgba(249,247,244,0.35)}
  .task-due{font-size:10px;margin-top:3px;letter-spacing:0.04em}
  .del-btn{font-size:20px;color:rgba(249,247,244,0.15);background:none;border:none;padding:0 2px;cursor:pointer;flex-shrink:0}
  .del-btn:active{color:#c4763a}
  .empty{text-align:center;padding:4rem 2rem;color:rgba(249,247,244,0.2);font-size:13px;letter-spacing:0.06em}
  .toast{position:fixed;bottom:max(24px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:#7B4518;color:#F9F7F4;font-size:12px;padding:10px 20px;letter-spacing:0.06em;opacity:0;transition:all 0.25s;pointer-events:none;white-space:nowrap;z-index:99}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .export-bar{background:rgba(123,69,24,0.12);border-top:0.5px solid rgba(123,69,24,0.25);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;padding-bottom:max(10px,env(safe-area-inset-bottom))}
  .export-bar span{font-size:11px;color:rgba(249,247,244,0.4);letter-spacing:0.04em}
  .export-btn{font-size:11px;font-family:'Plus Jakarta Sans',sans-serif;padding:6px 14px;background:#7B4518;border:none;color:#F9F7F4;cursor:pointer;letter-spacing:0.06em}
  .export-btn:active{background:#8f5220}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <div class="wm-a">AVIVA</div>
      <div class="wm-b">AESTHETICS</div>
    </div>
    <div class="header-right">
      <span class="saved-indicator" id="saved-indicator">Ready</span>
    </div>
  </div>

  <div class="add-form">
    <input class="add-input" type="text" id="task-input" placeholder="What needs to be done?" autocomplete="off" autocorrect="off"/>
    <div class="add-row">
      <select class="add-select" id="task-priority">
        <option value="urgent">Urgent</option>
        <option value="high">High</option>
        <option value="normal" selected>Normal</option>
      </select>
      <input class="add-date" type="date" id="task-due"/>
      <button class="add-btn" onclick="addTask()">+ Add</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="setFilter('all',this)">All</button>
    <button class="tab" onclick="setFilter('urgent',this)">Urgent</button>
    <button class="tab" onclick="setFilter('done',this)">Done</button>
  </div>

  <div class="task-list" id="task-list"></div>

  <div class="export-bar">
    <span>Copy tasks to import into dashboard</span>
    <button class="export-btn" onclick="copyForDashboard()">Copy JSON</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORE = 'aviva_mobile_v2';
let tasks = [], doneIds = new Set(), activeFilter = 'all', ctr = Date.now();

function uid(){ return 'm'+(ctr++) }

function save(){
  try{ localStorage.setItem(STORE, JSON.stringify({tasks, doneIds:[...doneIds]})) }catch(e){}
  const now = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  document.getElementById('saved-indicator').textContent = 'Saved '+now;
}

function load(){
  try{
    const d = JSON.parse(localStorage.getItem(STORE)||'null');
    if(d){ tasks=d.tasks||[]; doneIds=new Set(d.doneIds||[]); }
  }catch(e){}
}

function showToast(msg, dur=2000){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), dur);
}

function addTask(){
  const inp=document.getElementById('task-input');
  const pri=document.getElementById('task-priority');
  const due=document.getElementById('task-due');
  const title=inp.value.trim();
  if(!title) return;
  tasks.unshift({id:uid(),title,detail:'Added on iPhone',from:'Mobile',priority:pri.value,source:'mobile',due:due.value||''});
  inp.value=''; due.value='';
  save(); render();
  showToast('Task added');
}

function toggleDone(id){
  doneIds.has(id)?doneIds.delete(id):doneIds.add(id);
  save(); render();
}
function deleteTask(id){
  tasks=tasks.filter(t=>t.id!==id); doneIds.delete(id);
  save(); render();
}
function setFilter(f,btn){
  activeFilter=f;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); render();
}

function copyForDashboard(){
  const mobileTasks = tasks.filter(t=>t.source==='mobile');
  const json = JSON.stringify(mobileTasks.map(t=>({
    title: t.title,
    from: t.from,
    detail: t.detail,
    priority: t.priority,
    key: t.id
  })));
  navigator.clipboard.writeText(json).then(()=>{
    showToast('Copied! Paste into dashboard Outlook import box', 3000);
  }).catch(()=>{
    // fallback: show in prompt
    prompt('Copy this JSON and paste into the dashboard:', json);
  });
}

function formatDue(d){
  if(!d) return '';
  const dt=new Date(d+'T00:00:00'), today=new Date(); today.setHours(0,0,0,0);
  const diff=Math.round((dt-today)/(864e5));
  if(diff===0) return 'Today';
  if(diff===1) return 'Tomorrow';
  if(diff<0) return 'Overdue '+Math.abs(diff)+'d';
  if(diff<7) return 'In '+diff+'d';
  return dt.toLocaleDateString([],{month:'short',day:'numeric'});
}

function render(){
  const pOrder={urgent:0,high:1,normal:2};
  let vis=tasks.filter(t=>{
    if(activeFilter==='all') return !doneIds.has(t.id);
    if(activeFilter==='done') return doneIds.has(t.id);
    if(activeFilter==='urgent') return !doneIds.has(t.id)&&t.priority==='urgent';
    return !doneIds.has(t.id);
  });
  vis.sort((a,b)=>pOrder[a.priority]-pOrder[b.priority]);
  if(!vis.length){ document.getElementById('task-list').innerHTML='<div class="empty">Nothing here.</div>'; return; }
  const pc=p=>p==='urgent'?'#c4763a':p==='high'?'rgba(249,247,244,0.3)':' rgba(249,247,244,0.1)';
  document.getElementById('task-list').innerHTML = vis.map(t=>{
    const done=doneIds.has(t.id);
    const dueColor=t.due&&new Date(t.due+'T00:00:00')<=new Date()?'#c4763a':'rgba(249,247,244,0.3)';
    return '<div class="task'+(done?' done':'')+'">'
      +'<div class="pri-bar" style="background:'+pc(t.priority)+'"></div>'
      +'<div class="check'+(done?' checked':'')+'" onclick="toggleDone(\''+ t.id +'\')">'+
      (done?'<svg width="12" height="10" viewBox="0 0 12 10"><polyline points="1,5 4.5,8.5 11,1.5" stroke="#F9F7F4" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>':'')+'</div>'
      +'<div class="task-body">'
      +'<div class="task-title">'+esc(t.title)+'</div>'
      +(t.due?'<div class="task-due" style="color:'+dueColor+'">Due '+formatDue(t.due)+'</div>':'')+'</div>'
      +'<button class="del-btn" onclick="deleteTask(\''+ t.id +'\')">&times;</button>'
      +'</div>';
  }).join('');
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

load(); render();
</script>
</body>
</html>
